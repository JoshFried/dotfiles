# Amethyst Configuration

# Modifier keys
mod1:
  - option
  - shift

mod2:
  - option
  - shift
  - control

# Layouts (in cycle order)
layouts:
  - tall
  - bsp
  - wide
  - fullscreen
  - column

# Window settings
window-margins: false
window-margin-size: 0
window-resize-step: 5
window-minimum-height: 0
window-minimum-width: 0
window-max-count: 0

# Screen padding
screen-padding-top: 10
screen-padding-bottom: 10
screen-padding-left: 10
screen-padding-right: 10

# Behavior
float-small-windows: true
mouse-follows-focus: false
focus-follows-mouse: false
follow-space-thrown-windows: true
new-windows-to-main: false
restore-layouts-on-launch: true
enables-layout-hud: true
enables-layout-hud-on-space-change: true
debug-layout-info: false
ignore-menu-bar: false

# Keyboard shortcuts
# mod1 = Option+Shift, mod2 = Option+Shift+Control
throw-space-1:
  mod: mod1
  key: "1"
throw-space-2:
  mod: mod1
  key: "2"
throw-space-3:
  mod: mod1
  key: "3"
throw-space-4:
  mod: mod1
  key: "4"
throw-space-5:
  mod: mod1
  key: "5"
throw-space-6:
  mod: mod1
  key: "6"
throw-space-7:
  mod: mod1
  key: "7"
throw-space-8:
  mod: mod1
  key: "8"
throw-space-9:
  mod: mod1
  key: "9"
throw-space-10:
  mod: mod1
  key: "0"

# Floating apps (blacklist mode - these apps float)
floating-is-blacklist: true
floating:
  - id: org.hammerspoon.Hammerspoon
    window-titles: []
  - id: com.amazon.ACME
    window-titles: []
  - id: com.apple.systempreferences
    window-titles: []
  - id: com.apple.Music
    window-titles: []
  - id: com.apple.podcasts
    window-titles: []
  - id: com.amazon.Amazon-Chime
    window-titles: []
  - id: com.electron.amazonconnections
    window-titles: []
  - id: com.cisco.anyconnect.gui
    window-titles: []
  - id: com.cisco.anyconnect.macos.acsock
    window-titles: []
  - id: com.apple.finder
    window-titles: []
  - id: com.raycast.macos
    window-titles: []
  - id: com.apple.Notes
    window-titles: []
  - id: com.apple.MobileSMS
    window-titles: []
  - id: com.mitchellh.ghostty
    window-titles: []
  - id: com.jetbrains.intellij
    window-titles:
      - Settings
